
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
  .wrap { background: #080808; padding: 32px; display: flex; justify-content: center; }

  .card {
    width: 280px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .hdr-label { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #2a2a2a; }
  .online-pill { display: flex; align-items: center; gap: 5px; }
  .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; opacity: 0.85; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.85;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  .online-txt { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #2a2a2a; }

  .card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .intro-row { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 1px;
  }
  .intro-name { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.4px; line-height: 1.15; }
  .intro-sub  { font-size: 10px; color: #3a3a3a; margin-top: 3px; letter-spacing: 0.1px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat-cell {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 10px 10px 9px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .stat-val { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -0.8px; line-height: 1; }
  .stat-lbl { font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; text-align: center; line-height: 1.3; }

  .mood-row {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 9px 12px;
  }
  .mood-left { display: flex; align-items: center; gap: 7px; }
  .mood-txt  { font-size: 11px; color: #3a3a3a; }
  .dots { display: flex; gap: 3px; align-items: center; }
  .dot {
    width: 4px; height: 4px; border-radius: 50%; background: #2a2a2a;
    animation: bounce 1.1s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

  .divider { height: 1px; background: rgba(255,255,255,0.06); flex-shrink: 0; }

  .progress-section { display: flex; flex-direction: column; gap: 7px; }
  .prog-row { display: flex; flex-direction: column; gap: 4px; }
  .prog-top  { display: flex; justify-content: space-between; }
  .prog-name { font-size: 10px; color: #333; }
  .prog-pct  { font-size: 10px; color: #444; font-variant-numeric: tabular-nums; }
  .track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
  .fill  { height: 100%; background: rgba(255,255,255,0.25); border-radius: 999px; }

  .btn-primary {
    width: 100%; padding: 11px 0; border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff; font-size: 11px; font-weight: 700;
    letter-spacing: 0.6px; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: rgba(255,255,255,0.17); }
  .btn-secondary {
    width: 100%; padding: 10px 0; border-radius: 999px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.07);
    color: #2f2f2f; font-size: 11px; font-weight: 600;
    letter-spacing: 0.6px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-secondary:hover { color: #666; border-color: rgba(255,255,255,0.15); }
</style>

<div class="wrap">
  <div class="card">

    <div class="card-header">
      <span class="hdr-label">AI Examiner</span>
      <div class="online-pill">
        <div class="pulse-dot"></div>
        <span class="online-txt">Online</span>
      </div>
    </div>

    <div class="card-body">

      <div class="intro-row">
        <div class="avatar">AR</div>
        <div>
          <div class="intro-name">Hi, I'm ARIA</div>
          <div class="intro-sub">Your AI Viva Examiner · v2.0</div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-cell">
          <div class="stat-val">4,102</div>
          <div class="stat-lbl">Knowledge Nodes</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val">98%</div>
          <div class="stat-lbl">Confidence</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val">12ms</div>
          <div class="stat-lbl">Response Time</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val">v2.0</div>
          <div class="stat-lbl">Model Version</div>
        </div>
      </div>

      <div class="mood-row">
        <div class="mood-left">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#2f2f2f" stroke-width="2" stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span class="mood-txt">Awaiting your question…</span>
        </div>
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="progress-section">
        <div class="prog-row">
          <div class="prog-top"><span class="prog-name">Session Readiness</span><span class="prog-pct">100%</span></div>
          <div class="track"><div class="fill" style="width:100%"></div></div>
        </div>
        <div class="prog-row">
          <div class="prog-top"><span class="prog-name">Topics Mapped</span><span class="prog-pct">87%</span></div>
          <div class="track"><div class="fill" style="width:87%"></div></div>
        </div>
        <div class="prog-row">
          <div class="prog-top"><span class="prog-name">Voice Synthesis</span><span class="prog-pct">Ready</span></div>
          <div class="track"><div class="fill" style="width:100%"></div></div>
        </div>
      </div>

      <div class="divider"></div>

      <div style="display:flex;flex-direction:column;gap:7px;">
        <button class="btn-primary">Start Viva Session</button>
        <button class="btn-secondary">Upload Manual</button>
      </div>

    </div>
  </div>
</div>
